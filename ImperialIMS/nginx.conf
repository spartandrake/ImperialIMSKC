events {
    worker_connections 1024;
}

http {
    # Basic upstream to your ASP.NET Core app
    upstream aspnet_backend {
        server imperialims:8080;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Security headers (applied to all responses, including errors)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Limit request size (adjust as needed)
        client_max_body_size 10M;

        location / {
            proxy_pass http://aspnet_backend;

            proxy_http_version 1.1;

            # Host & forwarding headers for ASP.NET Core
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket / upgrade support (if you use it)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Avoid caching for dynamic pages
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Optional: custom error pages with headers
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}